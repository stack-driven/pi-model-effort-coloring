    <rect x="288" y="0" width="70" height="14" rx="7" fill="#F55036"/><text x="288" y="26" fill="#8b949e">Groq</text>
    <rect x="384" y="0" width="70" height="14" rx="7" fill="#FF7000"/><text x="384" y="26" fill="#8b949e">Mistral</text>
    <rect x="480" y="0" width="70" height="14" rx="7" fill="#4D6BFE"/><text x="480" y="26" fill="#8b949e">DeepSeek</text>
    <rect x="576" y="0" width="70" height="14" rx="7" fill="#0866FF"/><text x="576" y="26" fill="#8b949e">Llama</text>
