<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">munich-pi model effort colors preview</title>
  <desc id="desc">Preview of Pi footer colors for model providers and thinking effort levels.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#101419"/>
    </linearGradient>
    <linearGradient id="xhigh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8E6EDB"/>
      <stop offset="100%" stop-color="#B088F8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="960" height="380" rx="18" fill="url(#bgGrad)"/>

  <text x="32" y="42" fill="#f0f6fc" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="700">munich-pi</text>
  <text x="32" y="67" fill="#8b949e" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Color accents for Pi’s current model and thinking / effort level — footer layout unchanged</text>

  <g filter="url(#softShadow)">
    <rect x="32" y="90" width="896" height="112" rx="10" fill="#0f131a" stroke="#30363d"/>
    <text x="56" y="121" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700">~/dev/munich-pi (main)</text>
    <text x="56" y="147" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700">↑18.4k ↓2.1k R4.2k $0.042 12.7%/200k</text>
    <text x="56" y="176" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700">(anthropic)</text>
    <text x="172" y="176" fill="#DD7B5F" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700">claude-sonnet</text>
    <text x="304" y="176" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700">•</text>
    <rect x="328" y="158" width="72" height="25" rx="5" fill="#241B31" stroke="#4c356d"/>
    <text x="340" y="176" fill="url(#xhigh)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="700">xhigh</text>
  </g>

  <text x="32" y="238" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="700">Thinking / effort accents</text>
  <g transform="translate(32, 255)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" font-weight="700">
